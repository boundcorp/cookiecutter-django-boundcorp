# NOTE: This file must be encrypted with SOPS before committing to version control.
# Run: sops -e -i helm-values.staging.secrets.yaml
# See .sops.yaml for key configuration.
controllers:
    main:
        replicas: 3
        strategy: RollingUpdate
        containers:
            main:
                command:
                    - /app/infra/prod/start-uvicorn.sh
                image:
                    repository: {{cookiecutter.docker_image_url}}
                env:
                    DATABASE_HOST: postgres-postgresql
                    APP_ENV: staging
                    APP_HOSTNAME: staging.mydomain.com
                probes:
                    liveness:
                        enabled: true
                        port: 8000
                    readiness:
                        enabled: true
                        port: 8000
                    startup:
                        enabled: true
                        port: 8000
    celery:
        replicas: 1
        strategy: RollingUpdate
        containers:
            main:
                command:
                    - /app/infra/prod/start-celery-worker.sh
    beat:
        replicas: 1
        strategy: RollingUpdate
        containers:
            main:
                command:
                    - /app/infra/prod/start-celery-beat.sh
service:
    main:
        controller: main
        ports:
            http:
                port: 8000
ingress:
    main:
        className: nginx
        annotations:
            cert-manager.io/cluster-issuer: letsencrypt-prod
        hosts:
            - host: staging.mydomain.com
              paths:
                - path: /
                  pathType: Prefix
                  service:
                    name: main
                    port: 8000
        tls:
            - secretName: {{cookiecutter.project_name}}-staging-tls
              hosts:
                - staging.mydomain.com
